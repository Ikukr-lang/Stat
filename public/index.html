<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoinGold.Football</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        :root { --gold: #d4af37; }
        .tail-container { font-family: 'Inter', system-ui, sans-serif; }
        .hero-bg {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-bg::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(10,10,10,0.98)); }
        .gold-text { color: var(--gold); }
        .card-hover { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .card-hover:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 25px 50px -12px rgb(212 175 55 / 0.35); }
        .modal { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white overflow-x-hidden">

<!-- NAVBAR -->
<nav class="bg-black border-b border-amber-900 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-full flex items-center justify-center text-black font-bold text-2xl">⚽</div>
            <div>
                <span class="text-3xl font-bold tracking-tighter">Join</span>
                <span class="text-3xl font-bold tracking-tighter gold-text">Gold</span>
                <span class="text-3xl font-bold tracking-tighter">.Football</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showCodeModal()" 
                    class="flex items-center gap-3 bg-gradient-to-r from-amber-400 to-yellow-600 text-black font-bold text-xl px-10 py-6 rounded-3xl hover:scale-105 transition-all">
                <i class="fa-solid fa-key"></i> Войти через Telegram по коду
            </button>
            <button onclick="showVIP()" 
                    class="w-9 h-9 flex items-center justify-center text-3xl text-amber-400 hover:text-yellow-300">👑</button>
        </div>
    </div>
</nav>

<!-- HERO -->
<header class="hero-bg h-screen flex items-center relative">
    <div class="max-w-5xl mx-auto px-6 text-center relative z-10">
        <div class="inline-flex bg-black/70 px-6 py-2 rounded-3xl mb-6 border border-amber-400/30">
            <span class="text-sm uppercase tracking-widest font-medium text-amber-400">ПРЕМИУМ 2026</span>
        </div>
        <h1 class="text-6xl md:text-7xl font-bold leading-none mb-6 tracking-tighter">
            СОЗДАЙТЕ СВОЙ<br>ФУТБОЛЬНЫЙ САЙТ<br><span class="gold-text">ЗА 5 МИНУТ</span>
        </h1>
        <p class="max-w-xl mx-auto text-xl text-zinc-300 mb-10">
            Полный функционал join.football • Чёрно-золотой дизайн • Вход по коду без бота
        </p>
        <button onclick="showCodeModal()" 
                class="bg-gradient-to-r from-amber-400 to-yellow-600 text-black font-bold text-2xl px-16 py-7 rounded-3xl hover:scale-110 transition-all">
            НАЧАТЬ СЕЙЧАС
        </button>
    </div>
</header>

<!-- МОДАЛКА ВХОДА ПО КОДУ -->
<div id="code-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[999] modal">
    <div class="bg-zinc-900 max-w-md w-full mx-4 rounded-3xl p-8">
        <h3 class="text-3xl font-bold text-center mb-8 gold-text">Вход по коду</h3>
        
        <div id="phone-step">
            <input id="phone" type="text" placeholder="+7 999 123-45-67 или @username" 
                   class="w-full px-6 py-5 bg-black border border-amber-400 rounded-2xl text-lg outline-none">
            <button onclick="sendFakeCode()" 
                    class="mt-6 w-full py-6 bg-amber-400 text-black font-bold rounded-2xl text-lg">Отправить код в Telegram</button>
        </div>
        
        <div id="code-step" class="hidden">
            <div class="text-center mb-4 text-emerald-400 font-medium">Код отправлен!</div>
            <input id="code" type="text" maxlength="6" placeholder="123456" 
                   class="w-full text-center text-5xl tracking-[8px] bg-black border border-emerald-400 rounded-2xl py-6 outline-none">
            <button onclick="verifyFakeCode()" 
                    class="mt-6 w-full py-6 bg-emerald-400 text-black font-bold rounded-2xl text-lg">Подтвердить код</button>
        </div>
    </div>
</div>

<!-- VIP АДМИН-ПАНЕЛЬ -->
<div id="vip-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[999] modal">
    <div class="bg-zinc-900 max-w-4xl w-full mx-4 rounded-3xl overflow-hidden">
        <div class="bg-black p-6 flex justify-between items-center border-b border-amber-900">
            <div class="flex items-center gap-3 text-2xl font-bold"><span>👑</span> VIP АДМИН-ПАНЕЛЬ</div>
            <button onclick="closeVIP()" class="text-4xl text-zinc-400 hover:text-white">✕</button>
        </div>
        <div class="p-8">
            <h3 class="flex items-center gap-2 text-xl mb-6"><i class="fa-solid fa-users"></i> Все пользователи сайта</h3>
            <table id="visitors-table" class="w-full text-sm">
                <thead class="bg-zinc-950 text-amber-400">
                    <tr><th class="text-left py-4 px-4">Имя</th><th class="text-left py-4 px-4">Время входа</th><th class="text-left py-4 px-4">Telegram</th></tr>
                </thead>
                <tbody id="visitors-body" class="text-zinc-300"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// === ВЕСЬ JS ===
const CORRECT_HASH = "9b871512327c09ce91dd649b3f96a63b7408ef267c8cc5710114e629730cb61f";
let visitors = JSON.parse(localStorage.getItem('visitors')) || [];

async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function showVIP() {
    const pass = prompt("Введите VIP-пароль (222):");
    if (await sha256(pass) === CORRECT_HASH) {
        document.getElementById('vip-modal').classList.remove('hidden');
        renderVisitors();
    } else {
        alert("❌ Неверный пароль");
    }
}

function closeVIP() {
    document.getElementById('vip-modal').classList.add('hidden');
}

function renderVisitors() {
    const tbody = document.getElementById('visitors-body');
    tbody.innerHTML = visitors.map(v => `
        <tr class="border-b border-zinc-800 hover:bg-zinc-800">
            <td class="py-4 px-4">${v.name}</td>
            <td class="py-4 px-4">${v.time}</td>
            <td class="py-4 px-4">${v.username}</td>
        </tr>
    `).join('');
}

function showCodeModal() {
    document.getElementById('code-modal').classList.remove('hidden');
    document.getElementById('phone-step').classList.remove('hidden');
    document.getElementById('code-step').classList.add('hidden');
}

function sendFakeCode() {
    const phone = document.getElementById('phone').value.trim() || "+7 999 123-45-67";
    const code = Math.floor(100000 + Math.random() * 900000);
    
    alert(`✅ КОД ОТПРАВЛЕН В TELEGRAM!\n\nВаш код: ${code}\n\n(в реальной версии придёт в Telegram)`);
    
    window.currentCode = code.toString();
    window.currentPhone = phone;
    
    document.getElementById('phone-step').classList.add('hidden');
    document.getElementById('code-step').classList.remove('hidden');
}

function verifyFakeCode() {
    const entered = document.getElementById('code').value.trim();
    if (entered === window.currentCode) {
        const name = prompt("Как вас зовут?", "Игрок") || "Игрок";
        const user = {
            name: name,
            time: new Date().toLocaleString('ru-RU'),
            username: `@${window.currentPhone.replace(/[^a-zA-Z0-9]/g, '')}`
        };
        visitors.unshift(user);
        localStorage.setItem('visitors', JSON.stringify(visitors));
        
        alert(`✅ Добро пожаловать, ${name}!`);
        document.getElementById('code-modal').classList.add('hidden');
        if (!document.getElementById('vip-modal').classList.contains('hidden')) renderVisitors();
    } else {
        alert("❌ Неверный код");
    }
}

window.onload = () => {
    console.log('%c✅ JoinGold.Football СТАТИЧЕСКАЯ ВЕРСИЯ загружена', 'color:#d4af37; font-size:14px');
};
</script>
</body>
</html>
